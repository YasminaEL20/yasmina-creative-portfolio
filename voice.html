<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice | Yasmina</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  background-color:#EBD6DC;
  color:#3A2A39;
  overflow-x:hidden;
}

/* SECTION TITLES RESPONSIVE */
.section-title{
  font-weight:600;
  text-align:center;
  margin-bottom:40px;
  color:#674D66;
  font-size:1.8rem;
}

@media(min-width:768px){
  .section-title{
    font-size:2.5rem;
    margin-bottom:60px;
  }
}

/* GRID RESPONSIVE */
.voice-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

/* CARD */
.voice-card{
  position:relative;
  cursor:pointer;
  overflow:hidden;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(103,77,102,0.2);
  transition:0.4s ease;
}

.voice-card img{
  width:100%;
  height:220px;
  object-fit:cover;
  transition:0.6s ease;
}

@media(min-width:768px){
  .voice-card img{
    height:260px;
  }
}

.voice-card:hover img{
  transform:scale(1.08);
}

/* Overlay */
.voice-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(103,77,102,0.8),transparent);
  display:flex;
  align-items:flex-end;
  padding:18px;
}

.voice-overlay h3{
  color:white;
  font-size:1rem;
  font-weight:500;
}

@media(min-width:768px){
  .voice-overlay h3{
    font-size:1.2rem;
  }
}

/* MODAL RESPONSIVE */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  opacity:0;
  visibility:hidden;
  transition:0.4s ease;
  z-index:1000;
}

.modal.active{
  opacity:1;
  visibility:visible;
}

.modal-box{
  width:100%;
  max-width:900px;
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

/* Responsive iframe ratio */
.video-container{
  position:relative;
  width:100%;
  padding-top:56.25%; /* 16:9 */
}

.video-container iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:0;
}

.close{
  position:absolute;
  top:15px;
  right:20px;
  font-size:28px;
  color:white;
  cursor:pointer;
  z-index:10;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="py-6 relative">
  <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">

    <h1 class="text-xl md:text-2xl font-semibold text-[#674D66]">Yasmina</h1>

    <!-- Desktop Menu -->
    <div class="hidden md:flex gap-8 text-sm font-medium items-center">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="voice.html">Voice</a>
      <a href="index.html#contact"
         class="px-5 py-2 bg-[#674D66] text-white rounded-lg">
        Contact
      </a>
    </div>

    <!-- Mobile Button -->
    <button id="menu-btn" class="md:hidden text-2xl text-[#674D66]">
      ☰
    </button>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu"
       class="hidden md:hidden absolute top-full left-0 w-full bg-[#EBD6DC] shadow-md py-6 text-center space-y-4">

    <a href="index.html" class="block">Home</a>
    <a href="gallery.html" class="block">Gallery</a>
    <a href="voice.html" class="block">Voice</a>
    <a href="index.html#contact"
       class="inline-block px-5 py-2 bg-[#674D66] text-white rounded-lg">
      Contact
    </a>

  </div>
</nav>

<!-- DUBBING -->
<section class="max-w-7xl mx-auto px-6 py-16 md:py-20">
  <h2 class="section-title">Dubbing</h2>

  <div class="voice-grid">

    <div class="voice-card" data-video="https://drive.google.com/file/d/1EHg4enCcorvc0McKxZKRQgpqOlSwgaRH/preview">
      <img src="assets/images/thumbnails/english_dubbing.jpg" alt="">
      <div class="voice-overlay"><h3>English Dubbing</h3></div>
    </div>

    <div class="voice-card" data-video="https://drive.google.com/file/d/1HpehILN67pkHcyXLdt4Miho8e60ZLIUU/preview">
      <img src="assets/images/thumbnails/french_dubbing.jpg" alt="">
      <div class="voice-overlay"><h3>French Dubbing</h3></div>
    </div>

    <div class="voice-card" data-video="https://drive.google.com/file/d/1voQRAD85E02z0rdvh90vKueL_ZKGDRD3/preview">
      <img src="assets/images/thumbnails/arabic_dubbing.jpg" alt="">
      <div class="voice-overlay"><h3>Arabic Dubbing</h3></div>
    </div>

  </div>
</section>

<!-- VOICE OVER -->
<section class="max-w-7xl mx-auto px-6 pb-20 md:pb-24">
  <h2 class="section-title">Voice Over</h2>

  <div class="voice-grid">

    <div class="voice-card" data-video="https://drive.google.com/file/d/1XalZxLGJgEQRxJLh0YoDPS_H2yP-PNH6/preview">
      <img src="assets/images/thumbnails/english_voice_over.jpg" alt="">
      <div class="voice-overlay"><h3>English Voice Over</h3></div>
    </div>

    <div class="voice-card" data-video="https://drive.google.com/file/d/1vWpR2flsPDpJtGpGLb4s9ZxSVSy8EPSc/preview">
      <img src="assets/images/thumbnails/arabic_voice_over.jpg" alt="">
      <div class="voice-overlay"><h3>Arabic Voice Over</h3></div>
    </div>

    <div class="voice-card" data-video="https://drive.google.com/file/d/1vNiDoDel5CrxxS6WMI6ugij8BAqaNCF7/preview">
      <img src="assets/images/thumbnails/french_voice_over.jpg" alt="">
      <div class="voice-overlay"><h3>French Voice Over</h3></div>
    </div>

  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="close" id="close">&times;</div>
    <div class="video-container">
      <iframe id="video-frame" allow="autoplay" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script src="assets/js/voice.js"></script>

</body>
</html>
