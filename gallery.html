<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Yasmina</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  background-color:#EBD6DC;
  color:#3A2A39;
}

/* Masonry Layout */
.masonry{
  column-count:3;
  column-gap:24px;
}

@media(max-width:1024px){
  .masonry{ column-count:2; }
}

@media(max-width:640px){
  .masonry{ column-count:1; }
}

.art-card{
  break-inside:avoid;
  margin-bottom:24px;
  cursor:pointer;
  transition:0.4s ease;
}

.art-card img{
  width:100%;
  border-radius:16px;
  box-shadow:0 15px 30px rgba(103,77,102,0.2);
  transition:0.4s ease;
}

.art-card:hover img{
  transform:translateY(-8px);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(103,77,102,0.85);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:0.4s ease;
  z-index:1000;
}
.modal.active{
  opacity:1;
  visibility:visible;
}
.modal-box{
  background:#EBD6DC;
  width:90%;
  max-width:1000px;
  border-radius:20px;
  padding:40px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}
.close{
  position:absolute;
  top:30px;
  right:40px;
  font-size:30px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="py-6">
  <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">

    <h1 class="text-2xl font-semibold text-[#674D66]">Yasmina</h1>

    <div class="hidden md:flex gap-8 text-sm font-medium items-center">
      <a href="index.html" class="hover:text-[#674D66] transition">Home</a>

      <a href="gallery.html" class="text-[#674D66]">
        Gallery
      </a>

      <a href="voice.html" class="hover:text-[#674D66] transition">Voice</a>

      <!-- CONTACT BUTTON -->
      <a href="index.html#contact"
        class="px-6 py-2 bg-[#674D66] text-white rounded-lg 
                hover:bg-[#533C52] transition shadow-md">
        Contact
      </a>
    </div>

  </div>
</nav>

<!-- GALLERY -->
<section class="max-w-7xl mx-auto px-6 py-16">
  <h2 class="text-4xl font-semibold text-center mb-14 text-[#674D66]">
    Selected Works
  </h2>

  <div id="gallery-grid" class="masonry"></div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="close" id="close">&times;</div>

  <div class="modal-box">
    <div>
      <img id="modal-img" class="rounded-xl shadow-lg w-full object-contain">
    </div>
    <div class="flex flex-col justify-center space-y-6">
      <h3 id="modal-title" class="text-3xl font-semibold text-[#674D66]"></h3>
      <p id="modal-year" class="text-sm uppercase tracking-widest text-[#674D66]"></p>
      <p id="modal-desc" class="leading-relaxed"></p>
    </div>
  </div>
</div>

<script src="assets/js/gallery.js"></script>
</body>
</html>
