<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Yasmina</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  background-color:#EBD6DC;
  color:#3A2A39;
}

/* Responsive Masonry */
.masonry{
  column-count:3;
  column-gap:20px;
}

@media(max-width:1024px){
  .masonry{ column-count:2; }
}

@media(max-width:640px){
  .masonry{ column-count:1; }
}

.art-card{
  break-inside:avoid;
  margin-bottom:20px;
  cursor:pointer;
  transition:0.4s ease;
}

.art-card img{
  width:100%;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(103,77,102,0.2);
  transition:0.4s ease;
}

.art-card:hover img{
  transform:translateY(-6px);
}

/* MODAL RESPONSIVE */
.modal{
  position:fixed;
  inset:0;
  background:rgba(103,77,102,0.85);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  opacity:0;
  visibility:hidden;
  transition:0.4s ease;
  z-index:1000;
}

.modal.active{
  opacity:1;
  visibility:visible;
}

.modal-box{
  background:#EBD6DC;
  width:100%;
  max-width:900px;
  border-radius:20px;
  padding:30px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

@media(max-width:768px){
  .modal-box{
    grid-template-columns:1fr;
  }
}

.close{
  position:absolute;
  top:20px;
  right:25px;
  font-size:28px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<nav class="py-6 relative">
  <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">

    <h1 class="text-xl md:text-2xl font-semibold text-[#674D66]">Yasmina</h1>

    <!-- Desktop Menu -->
    <div class="hidden md:flex gap-8 text-sm font-medium items-center">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="voice.html">Voice</a>
      <a href="index.html#contact"
         class="px-5 py-2 bg-[#674D66] text-white rounded-lg">
        Contact
      </a>
    </div>

    <!-- Mobile Button -->
    <button id="menu-btn" class="md:hidden text-2xl text-[#674D66]">
      ☰
    </button>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu"
       class="hidden md:hidden absolute top-full left-0 w-full bg-[#EBD6DC] shadow-md py-6 text-center space-y-4">

    <a href="index.html" class="block">Home</a>
    <a href="gallery.html" class="block">Gallery</a>
    <a href="voice.html" class="block">Voice</a>
    <a href="index.html#contact"
       class="inline-block px-5 py-2 bg-[#674D66] text-white rounded-lg">
      Contact
    </a>

  </div>
</nav>
<section class="max-w-7xl mx-auto px-6 py-12 md:py-16">
  <h2 class="text-2xl md:text-4xl font-semibold text-center mb-10 text-[#674D66]">
    Selected Works
  </h2>

  <div id="gallery-grid" class="masonry"></div>
</section>

<div class="modal" id="modal">
  <div class="close" id="close">&times;</div>

  <div class="modal-box">
    <div>
      <img id="modal-img" class="rounded-xl shadow-lg w-full object-contain">
    </div>
    <div class="flex flex-col justify-center space-y-4">
      <h3 id="modal-title" class="text-xl md:text-3xl font-semibold text-[#674D66]"></h3>
      <p id="modal-year" class="text-xs uppercase tracking-widest text-[#674D66]"></p>
      <p id="modal-desc" class="leading-relaxed text-sm md:text-base"></p>
    </div>
  </div>
</div>

<script src="assets/js/gallery.js"></script>

</body>
</html>
